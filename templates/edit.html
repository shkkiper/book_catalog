{% extends "base.html" %}

{% block title %}Редактировать {{ book.title }}{% endblock %}

{% block content %}
<div class="edit-container">
    <h1>✏️ Редактирование книги</h1>
    
    <form method="POST" class="admin-form">
        <div class="form-group">
            <label>Название:</label>
            <input type="text" name="title" value="{{ book.title }}" required>
        </div>
        
        <div class="form-group">
            <label>Автор:</label>
            <input type="text" name="author" value="{{ book.author }}" required>
        </div>
        
        <div class="form-group">
            <label>Год:</label>
            <input type="number" name="year" value="{{ book.year }}" required>
        </div>
        
        <div class="form-group">
            <label>Описание:</label>
            <textarea name="description" rows="5" required>{{ book.description }}</textarea>
        </div>
        
        <div class="form-group">
            <label>URL обложки:</label>
            <input type="url" name="image_url" value="{{ book.image_url or '' }}">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-save">💾 Сохранить изменения</button>
            <a href="/admin" class="btn-cancel">❌ Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
